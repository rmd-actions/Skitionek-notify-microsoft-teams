name: Integrity Checks

on:
  push:
  pull_request:

permissions: read-all

jobs:
  check-build:
    name: Check dist is up to date
    runs-on: ubuntu-latest
    permissions:
      contents: write # needed to push rebuilt dist/ back to PR branch
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Check out the actual branch so we can push back on PRs.
          ref: ${{ github.head_ref || github.ref_name }}
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm ci
      - run: npm run package
      - name: Verify build output is committed
        id: dist_check
        run: |
          if git diff --quiet dist/; then
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
          else
            echo "up_to_date=false" >> "$GITHUB_OUTPUT"
            git diff --stat dist/
          fi
      # Auto-commit rebuilt dist/ back to the PR branch so contributors
      # don't need to remember to run `npm run package` manually.
      - name: Commit rebuilt dist/
        if: >
          steps.dist_check.outputs.up_to_date == 'false' &&
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist/
          git commit -m "build: rebuild dist/ [skip ci]"
          git push
      - name: Fail if dist is still out of date
        if: steps.dist_check.outputs.up_to_date == 'false'
        run: |
          echo "dist/ is out of date. Run 'npm run package' and commit the result."
          exit 1

  check-lockfile:
    name: Check package-lock.json is up to date
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --package-lock-only
      - name: Verify package-lock.json is up to date
        run: git diff --exit-code package-lock.json
