name: Lint

on:
  pull_request:
    paths:
      - src/*
  push:
    paths:
      - src/*

jobs:
  eslint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm run lint