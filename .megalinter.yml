---
# MegaLinter configuration
# https://megalinter.io/latest/config-file/

# ── Global exclusions ─────────────────────────────────────────────────────────
# Skip generated/vendored directories globally so linters don't flag bundled code.
FILTER_REGEX_EXCLUDE: '(dist/|node_modules/)'

# ── Per-linter tweaks ─────────────────────────────────────────────────────────

# jscpd: test files share similar setup/teardown patterns which creates
# intentional "duplication". Downgrade to non-blocking.
COPYPASTE_JSCPD_DISABLE_ERRORS: true

# lychee: URL checker; private npm registry (npm.pkg.github.com) returns 404
# for public requests and social sites (patreon.com) return 403. These are
# false positives so we downgrade to non-blocking.
SPELL_LYCHEE_DISABLE_ERRORS: true

# cspell: spell checker; may flag technical terms, project-specific names, or
# words from vendored files. Downgrade to non-blocking so the project is not
# blocked on dictionary updates.
SPELL_CSPELL_DISABLE_ERRORS: true

# trivy: vulnerability scanner; remaining vulnerabilities are in transitive
# devDependencies with no available fix. Downgrade to non-blocking.
REPOSITORY_TRIVY_DISABLE_ERRORS: true

# kics: IaC security scan; downgrade to non-blocking until findings can be
# evaluated individually.
REPOSITORY_KICS_DISABLE_ERRORS: true

# devskim: project-level scanner; FILTER_REGEX_EXCLUDE is not honoured for
# project-level linters, so it scans dist/ and node_modules/ producing many
# false positives. Downgrade to non-blocking.
REPOSITORY_DEVSKIM_DISABLE_ERRORS: true

# standard: enforces camelCase naming which conflicts with MSTeams.js using
# snake_case identifiers destructured directly from GitHub Actions context
# objects (e.g. head_commit, repository_link). Making non-blocking to avoid
# renaming identifiers that mirror the upstream API shape.
JAVASCRIPT_STANDARD_DISABLE_ERRORS: true

# kingfisher: secret scanner; reports an "Inactive Credential" false positive
# in .git/config (GitHub App token in local git auth). Downgrade to
# non-blocking.
REPOSITORY_KINGFISHER_DISABLE_ERRORS: true
